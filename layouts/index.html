{{ define "main" }}

<div class="container">

<header class="header">

<h1>

آب و هوای کردستان

</h1>

<p>

پیش بینی آنلاین شهرهای استان کردستان

</p>

</header>

<div class="weather-card">

<div class="top">

<select id="city">

{{ range .Site.Data.cities.cities }}

<option
value="{{ .lat }},{{ .lon }}">

{{ .name }}

</option>

{{ end }}

</select>
<button id="locationBtn">
📍 موقعیت من
</button>
</div>

<div class="icon">

<img id="weatherIcon"

src="/icons/sun.svg">

</div>

<div id="temperature">

--°

</div>

<div id="condition">

در حال دریافت...

</div>

<div class="info">

<div class="box">

<img src="/icons/wind.svg">

<span id="wind">

--

</span>

</div>

<div class="box">

<img src="/icons/humidity.svg">

<span id="humidity">

--

</span>

</div>

<div class="box">

🌧

<span id="rain">

--

</span>

</div>

<div class="box">

📍

<span id="cityLabel">

سقز

</span>

</div>

</div>

</div>

<h2>

پیش بینی هفت روز آینده

</h2>

<div id="forecast">

</div>
<section class="card map-card">

<h2>
🗺️ نقشه استان کردستان
</h2>

<div id="map"></div>
<section class="card">

<h2>
📈 دمای ۲۴ ساعت آینده
</h2>

<canvas id="temperatureChart"></canvas>

</section>
<section class="card sun-card">

    <h2>🌅 خورشید</h2>

    <div class="sun-grid">

        <div class="sun-item">

            <div>🌄 طلوع</div>

            <strong id="sunrise">--:--</strong>

        </div>

        <div class="sun-item">

            <div>🌇 غروب</div>

            <strong id="sunset">--:--</strong>

        </div>

        <div class="sun-item">

            <div>☀️ طول روز</div>

            <strong id="dayLength">--</strong>

        </div>

    </div>

</section>
</section>
</div>

{{ end }}
